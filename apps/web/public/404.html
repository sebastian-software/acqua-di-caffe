<!doctype html>
<html lang="de">
  <head>
    <meta charset="utf-8" />
    <title>Acqua di Caffè</title>
    <script>
      (function () {
        var basePath = "/acqua-di-caffe";
        var pathname = window.location.pathname;
        var route = pathname.indexOf(basePath) === 0 ? pathname.slice(basePath.length) : pathname;

        if (!route || route === "/") {
          route = "/";
        }

        window.sessionStorage.setItem(
          "acqua-di-caffe:redirect",
          route + window.location.search + window.location.hash,
        );
        window.location.replace(basePath + "/");
      })();
    </script>
  </head>
  <body></body>
</html>
